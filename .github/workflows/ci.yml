name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        env:
          DATABASE_URL: postgres://revagent:revagent@localhost:5432/revagent
          GEMINI_API_KEY: ci-stub
          SPEECHMATICS_API_KEY: ci-stub
          FEATHERLESS_API_KEY: ci-stub
          VULTR_S3_ENDPOINT: http://localhost:9000
          VULTR_S3_ACCESS_KEY: ci-stub
          VULTR_S3_SECRET_KEY: ci-stub
          RESEND_API_KEY: ci-stub
          APP_SHARED_SECRET: ci-stub-secret
        run: bun run build
